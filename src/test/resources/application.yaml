spring:
  datasource:
    url: jdbc:h2:mem:job_search_platform_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    root: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
