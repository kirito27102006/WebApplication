name: SonarCloud

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  sonar:
    name: Build, Test and SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build, test and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B clean verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=kirito27102006 \
            -Dsonar.projectKey=kirito27102006_WebApplication \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.coverage.inclusions=src/main/java/org/example/jobsearchplatform/service/*Service.java
